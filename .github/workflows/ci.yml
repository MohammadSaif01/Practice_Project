name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  backend-build:
    name: Backend Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify backend entry
        run: node -e "require('./src/config/env'); console.log('backend check ok')"

  frontend-build:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  docker-security-scan:
    name: Dockerfile Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy scan for backend production Dockerfile
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: config
          scan-ref: backend/Dockerfile.prod
          format: sarif
          output: trivy-backend-dockerfile.sarif
          exit-code: '0'

      - name: Run Trivy scan for frontend production Dockerfile
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: config
          scan-ref: frontend/Dockerfile.prod
          format: sarif
          output: trivy-frontend-dockerfile.sarif
          exit-code: '0'

      - name: Upload backend scan result
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend-dockerfile.sarif

      - name: Upload frontend scan result
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend-dockerfile.sarif

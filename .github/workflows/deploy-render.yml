name: Deploy Render

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  deploy:
    name: Trigger Render Deploy Hooks
    runs-on: ubuntu-latest
    steps:
      - name: Trigger backend deploy
        if: ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND != '' }}
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_BACKEND"
        env:
          RENDER_DEPLOY_HOOK_BACKEND: ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}

      - name: Trigger frontend deploy
        if: ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND != '' }}
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_FRONTEND"
        env:
          RENDER_DEPLOY_HOOK_FRONTEND: ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}

      - name: Summary
        run: |
          echo "Render deploy hooks triggered if secrets are configured."
          echo "Expected repo secrets: RENDER_DEPLOY_HOOK_BACKEND, RENDER_DEPLOY_HOOK_FRONTEND"

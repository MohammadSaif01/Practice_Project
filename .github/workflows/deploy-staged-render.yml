name: Deploy Render Staged

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]

jobs:
  deploy-backend:
    name: Deploy Backend First
    runs-on: ubuntu-latest
    steps:
      - name: Validate backend secrets
        run: |
          if [ -z "${RENDER_DEPLOY_HOOK_BACKEND}" ] || [ -z "${BACKEND_BASE_URL}" ]; then
            echo "Missing required secrets: RENDER_DEPLOY_HOOK_BACKEND or BACKEND_BASE_URL"
            exit 1
          fi
        env:
          RENDER_DEPLOY_HOOK_BACKEND: ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}
          BACKEND_BASE_URL: ${{ secrets.BACKEND_BASE_URL }}

      - name: Trigger backend deploy
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_BACKEND"
        env:
          RENDER_DEPLOY_HOOK_BACKEND: ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}

      - name: Wait for backend readiness
        run: |
          for i in {1..40}; do
            if curl -fsS "${BACKEND_BASE_URL}/api/ready" >/dev/null; then
              echo "Backend is ready"
              exit 0
            fi
            echo "Waiting for backend readiness..."
            sleep 15
          done
          echo "Backend did not become ready in time"
          exit 1
        env:
          BACKEND_BASE_URL: ${{ secrets.BACKEND_BASE_URL }}

  deploy-frontend:
    name: Deploy Frontend After Backend Healthy
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Validate frontend secrets
        run: |
          if [ -z "${RENDER_DEPLOY_HOOK_FRONTEND}" ] || [ -z "${FRONTEND_BASE_URL}" ]; then
            echo "Missing required secrets: RENDER_DEPLOY_HOOK_FRONTEND or FRONTEND_BASE_URL"
            exit 1
          fi
        env:
          RENDER_DEPLOY_HOOK_FRONTEND: ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}
          FRONTEND_BASE_URL: ${{ secrets.FRONTEND_BASE_URL }}

      - name: Trigger frontend deploy
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_FRONTEND"
        env:
          RENDER_DEPLOY_HOOK_FRONTEND: ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}

      - name: Verify frontend responds
        run: |
          for i in {1..20}; do
            if curl -fsS "${FRONTEND_BASE_URL}" >/dev/null; then
              echo "Frontend is reachable"
              exit 0
            fi
            echo "Waiting for frontend..."
            sleep 10
          done
          echo "Frontend did not become reachable"
          exit 1
        env:
          FRONTEND_BASE_URL: ${{ secrets.FRONTEND_BASE_URL }}

  notify-on-failure:
    name: Optional Failure Alert
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: ${{ failure() && secrets.SLACK_WEBHOOK_URL != '' }}
    steps:
      - name: Send Slack alert
        run: |
          payload='{"text":"DevHelp staged deploy failed for '${GITHUB_REPOSITORY}' on '${GITHUB_REF_NAME}'"}'
          curl -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

services:
  - type: web
    name: devhelp-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: RATE_LIMIT_MAX
        value: 300
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_ORIGIN
        value: https://*.onrender.com,http://localhost:5173

  - type: static
    name: devhelp-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://devhelp-1bu2.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
